<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #111827, #374151);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            background: white;
            width: 360px;
            padding: 35px;
            border-radius: 14px;
            box-shadow: 0 5px 18px rgba(0,0,0,0.3);
            text-align: center;
        }

        h2 {
            color: #111827;
            margin-bottom: 20px;
        }

        input {
            width: 92%;
            padding: 11px;
            margin: 9px 0;
            border: 1px solid #ccc;
            border-radius: 7px;
        }

        button {
            width: 98%;
            padding: 11px;
            margin-top: 12px;
            background: #111827;
            color: white;
            border: none;
            border-radius: 7px;
            cursor: pointer;
            font-size: 15px;
        }

        button:hover {
            background: #000;
        }

        p {
            margin-top: 15px;
        }

        a {
            color: #2563eb;
            text-decoration: none;
            font-weight: bold;
        }

        #msg {
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Admin Login</h2>

    <input type="email" id="email" placeholder="Admin Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="adminLogin()">Login</button>

    <p id="msg"></p>
    <p>New admin? <a href="/admin_register">Register</a></p>
</div>

<script>
function adminLogin() {
    fetch('/admin_login_api', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            admin_email: document.getElementById('email').value,
            password: document.getElementById('password').value
        })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById('msg').innerText = data.message;

        if (data.admin) {
            localStorage.setItem("admin_id", data.admin.id);
            window.location.href = "/admin";
        }
    });
}
</script>

</body>
</html>
